version: 2

sources:
  - name: raw
    database: "{{ env_var('SNOWFLAKE_DATABASE', 'ODS_TRIAL') }}"
    schema: RAW
    tables:
      - name: ECONOMIC_CENSUS_2009
        description: |
          e-Stat 経済センサス‐基礎調査（2009年）。
          産業分類×従業者規模×経営組織×地域の組み合わせに対する事業所数・従業者数。
          統計表ID: 0003032544
      - name: ECONOMIC_CENSUS_2014
        description: |
          e-Stat 経済センサス‐基礎調査（2014年・平成26年）。
          産業分類（中分類）×従業者規模（13区分）×経営組織（5区分）×地域（全国・都道府県・大都市）の組み合わせに対する事業所数・従業者数（男女別）・常用雇用者数。
          ECONOMIC_CENSUS_2009と産業・規模・経営組織・地域で結合し、2009→2014の時系列変化分析に使用可能。
          統計表ID: 0003111060
      - name: POPULATION_CENSUS_2010
        description: |
          e-Stat 国勢調査（2010年・平成22年）。
          産業（中分類）×従業上の地位（3区分）×男女別の15歳以上就業者数。地域は全国・都道府県・都道府県市部・人口50万以上の市区。
          ECONOMIC_CENSUS_2009/2014と産業分類・都道府県コードで結合し、事業所ベース従業者数と居住地ベース就業者数の比較に使用可能。
          統計表ID: 0003033029
      - name: POPULATION_ESTIMATE
        description: |
          e-Stat 人口推計（年次・都道府県別）。
          都道府県×年齢（5歳階級）×男女別の総人口。2005年以降の時系列を含む。
          ECONOMIC_CENSUS_2009/2014と都道府県コードで結合し、人口あたり事業所数・産業特化係数（Location Quotient）の計算に使用可能。
          統計表ID: 0004010049
      - name: WAGE_STARTING_SALARY_2009
        description: |
          e-Stat 賃金構造基本統計調査（2009年）。
          都道府県×産業（大分類）×企業規模（4区分）×性別×学歴別の新規学卒者初任給額。
          ECONOMIC_CENSUS_2009と都道府県・産業・企業規模で結合し、産業×地域×規模別の初任給水準と雇用規模の相関分析に使用可能。
          統計表ID: 0003031016
