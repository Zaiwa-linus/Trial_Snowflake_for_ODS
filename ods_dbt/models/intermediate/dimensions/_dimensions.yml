version: 2

models:
  # ── 経済センサス共通 ──────────────────────────────────────────────────────
  - name: int_mst_ec09_industry
    description: |
      経済センサス2009の産業分類マスタ。2014とはコード体系が異なる（同一コードが別産業）。
      int_fct_economic_census の source_survey='2009' の行にJOINして使用。
      industry_level='中分類' のみがファクトテーブルに存在する。
    meta:
      domain: labor_market
      owner_team: data-platform
      lifecycle_status: active
    columns:
      - name: industry_code
        data_type: varchar
        tests: [not_null, unique]
        meta:
          concept_uri: urn:opendata:estat:ec2009:IndustryCode
          business_name: 産業分類コード（経済センサス2009）
          privacy_category: non_pii
      - name: industry_name
        data_type: varchar
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec2009:IndustryName
          business_name: 産業分類名称（経済センサス2009）
          privacy_category: non_pii
      - name: industry_level
        data_type: varchar
        description: "'集計行' | '大分類' | '中分類'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['集計行', '大分類', '中分類']
        meta:
          concept_uri: urn:opendata:estat:ec2009:IndustryLevel
          business_name: 産業分類粒度（経済センサス2009）
          privacy_category: non_pii

  - name: int_mst_ec14_industry
    description: |
      経済センサス2014の産業分類マスタ（H26基準）。2009とはコード体系が異なる。
      int_fct_economic_census の source_survey='2014' の行にJOINして使用。
      industry_level='中分類' のみがファクトテーブルに存在する。
    meta:
      domain: labor_market
      owner_team: data-platform
      lifecycle_status: active
    columns:
      - name: industry_code
        data_type: varchar
        tests: [not_null, unique]
        meta:
          concept_uri: urn:opendata:estat:ec2014:IndustryCode
          business_name: 産業分類コード（経済センサス2014）
          privacy_category: non_pii
      - name: industry_name
        data_type: varchar
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec2014:IndustryName
          business_name: 産業分類名称（経済センサス2014）
          privacy_category: non_pii
      - name: industry_level
        data_type: varchar
        description: "'集計行' | '大分類' | '中分類'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['集計行', '大分類', '中分類']
        meta:
          concept_uri: urn:opendata:estat:ec2014:IndustryLevel
          business_name: 産業分類粒度（経済センサス2014）
          privacy_category: non_pii

  - name: int_mst_ec09_employee_size
    description: |
      経済センサス2009の従業者規模マスタ。2014とはコード体系が異なる。
      2009: 001=1〜4人合計(集計) / 002=1人 / 003=2人 / 004=3人 / 005=4人 / ...
      is_aggregate=true の 000(総数)・001(1-4人合計) はファクトテーブルに存在しない。
    meta:
      domain: labor_market
      owner_team: data-platform
      lifecycle_status: active
    columns:
      - name: employee_size_code
        data_type: varchar
        tests: [not_null, unique]
        meta:
          concept_uri: urn:opendata:estat:ec2009:EmployeeSizeCode
          business_name: 従業者規模コード（経済センサス2009）
          privacy_category: non_pii
      - name: employee_size_name
        data_type: varchar
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec2009:EmployeeSizeName
          business_name: 従業者規模名称（経済センサス2009）
          privacy_category: non_pii
      - name: is_aggregate
        data_type: boolean
        description: "true=集計行（ファクトテーブルには含まれない）"
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec2009:EmployeeSizeIsAggregate
          business_name: 集計行フラグ（従業者規模2009）
          privacy_category: non_pii

  - name: int_mst_ec14_employee_size
    description: |
      経済センサス2014の従業者規模マスタ。2009とはコード体系が異なる。
      2014: 001=1人 / 002=2人 / 003=3人 / 004=4人 / 005=1〜4人合計(集計) / 006=5〜9人 / ...
      is_aggregate=true の 000(総数)・005(1-4人合計) はファクトテーブルに存在しない。
    meta:
      domain: labor_market
      owner_team: data-platform
      lifecycle_status: active
    columns:
      - name: employee_size_code
        data_type: varchar
        tests: [not_null, unique]
        meta:
          concept_uri: urn:opendata:estat:ec2014:EmployeeSizeCode
          business_name: 従業者規模コード（経済センサス2014）
          privacy_category: non_pii
      - name: employee_size_name
        data_type: varchar
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec2014:EmployeeSizeName
          business_name: 従業者規模名称（経済センサス2014）
          privacy_category: non_pii
      - name: is_aggregate
        data_type: boolean
        description: "true=集計行（ファクトテーブルには含まれない）"
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec2014:EmployeeSizeIsAggregate
          business_name: 集計行フラグ（従業者規模2014）
          privacy_category: non_pii

  - name: int_mst_ec09_org_type
    description: |
      経済センサス2009の経営組織マスタ。
