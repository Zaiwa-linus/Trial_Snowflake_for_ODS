  - name: int_mst_ec_region
    description: |
      経済センサス（2009・2014）地域マスタ。両年のコードをUNIONして重複排除。
      region_type で地域粒度を識別できる。
    meta:
      domain: labor_market
      owner_team: data-platform
      lifecycle_status: active
    columns:
      - name: region_code
        data_type: varchar
        tests: [not_null, unique]
        meta:
          concept_uri: urn:opendata:estat:ec:RegionCode
          business_name: 地域コード（経済センサス）
          privacy_category: non_pii
      - name: region_name
        data_type: varchar
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec:RegionName
          business_name: 地域名称（経済センサス）
          privacy_category: non_pii
      - name: region_type
        data_type: varchar
        description: "'全国' | '大都市圏' | '都道府県' | '政令市等'"
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec:RegionType
          business_name: 地域区分（経済センサス）
          privacy_category: non_pii
      - name: pref_code
        data_type: varchar
        description: 都道府県コード2桁（region_codeの先頭2桁）
        meta:
          concept_uri: urn:opendata:estat:ec:PrefectureCode
          business_name: 都道府県コード（経済センサス）
          privacy_category: non_pii

  - name: int_mst_ec_measure
    description: |
      経済センサス（2009・2014）表章項目マスタ。
      2009と2014でコード体系が異なるため survey_year で区別。
      ファクトテーブルとのJOINは measure_code AND survey_year の両方で行うこと。
    meta:
      domain: labor_market
      owner_team: data-platform
      lifecycle_status: active
    columns:
      - name: measure_code
        data_type: varchar
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec:MeasureCode
          business_name: 表章項目コード（経済センサス）
          privacy_category: non_pii
      - name: measure_name
        data_type: varchar
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec:MeasureName
          business_name: 表章項目名称（経済センサス）
          privacy_category: non_pii
      - name: survey_year
        data_type: integer
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:ec:SurveyYear
          business_name: 調査年（経済センサス）
          privacy_category: non_pii

