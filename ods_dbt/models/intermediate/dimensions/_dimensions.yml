          privacy_category: non_pii
      - name: region_type
        data_type: varchar
        description: "'全国' | '全国市郡部' | '都道府県' | '都道府県市部' | '政令市等'"
        meta:
          concept_uri: urn:opendata:estat:pc2010:RegionType
          business_name: 地域区分（国勢調査2010）
          privacy_category: non_pii
      - name: pref_code
        data_type: varchar
        description: 都道府県コード2桁（全国系コードはnull）
        meta:
          concept_uri: urn:opendata:estat:pc2010:PrefectureCode
          business_name: 都道府県コード（国勢調査2010）
          privacy_category: non_pii

