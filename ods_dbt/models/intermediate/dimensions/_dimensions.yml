        data_type: varchar
        tests: [not_null, unique]
        meta:
          concept_uri: urn:opendata:estat:census:SexCode
          business_name: 性別コード（国勢調査・人口推計系）
          privacy_category: non_pii
      - name: sex_name
        data_type: varchar
        tests: [not_null]
        meta:
          concept_uri: urn:opendata:estat:census:SexName
          business_name: 性別名称（国勢調査・人口推計系）
          privacy_category: non_pii
      - name: is_aggregate
        data_type: boolean
        description: "true=000(男女計/総数)"
